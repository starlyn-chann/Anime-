<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://files.catbox.moe/r31kfd.jpg" type="image/jpeg">
    <title>BubbleVerse · Personajes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            color: white;
            overflow: hidden;
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 20%, transparent 100%), 
                        url('https://files.catbox.moe/cwdqek.jpeg');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* PERFIL SUPERIOR */
        #user-profile {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }

        /* burbujas de estado */
        .status-bubble {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 5px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: 'Montserrat', sans-serif;
        }

        .status-bubble span {
            font-size: 12px;
        }

        .battery-icon {
            width: 18px;
            height: 10px;
            border: 1px solid rgba(255,255,255,0.7);
            border-radius: 3px;
            position: relative;
            background: rgba(255,255,255,0.2);
        }

        .battery-icon::after {
            content: '';
            position: absolute;
            right: -3px;
            top: 2px;
            width: 3px;
            height: 4px;
            background: rgba(255,255,255,0.7);
            border-radius: 1px;
        }

        .battery-level {
            height: 100%;
            border-radius: 2px;
            background: #4ade80;
        }

        /* CONTENIDO PRINCIPAL */
        .wrapper {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 8%;
        }

        .title { 
            font-size: 12px; 
            letter-spacing: 10px; 
            text-transform: uppercase; 
            font-weight: 300; 
            margin-bottom: 30px; 
            opacity: 0.6; 
            font-family: 'Montserrat', sans-serif;
        }

        /* BURBUJAS */
        .bubbles-nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble-link {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            width: fit-content;
        }

        .bubble-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .bubble-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bubble-text {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.25);
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 1px;
        }

        .bubble-link:hover .bubble-circle {
            border-color: rgba(255,255,255,0.7);
            transform: scale(1.08);
            background: rgba(255, 255, 255, 0.15);
        }

        .bubble-link:hover .bubble-text {
            -webkit-text-stroke: 1px rgba(255,255,255,0);
            color: white;
            transform: translateX(12px);
        }

        .footer {
            position: absolute;
            bottom: 40px;
            left: 8%;
            display: flex;
            gap: 50px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
            font-family: 'Montserrat', sans-serif;
        }

        .owner-tag { font-weight: 800; color: white; opacity: 1; }

        @media (max-width: 768px) {
            .bubble-text { font-size: 20px; }
            .bubble-circle { width: 35px; height: 35px; }
            .title { font-size: 9px; letter-spacing: 6px; }
            .status-bubble { padding: 3px 8px; font-size: 9px; }
            .status-bubble span { font-size: 10px; }
        }
    </style>
</head>
<body>

    <div id="user-profile">
        <img class="user-avatar" src="https://files.catbox.moe/4m8x7l.jpeg" alt="profile">
        
        <div class="status-bubble" id="batteryBubble">
            <div class="battery-icon">
                <div class="battery-level" id="batteryLevelFill" style="width: 0%;"></div>
            </div>
            <span id="batteryPercent">--%</span>
        </div>
        
        <div class="status-bubble" id="timeBubble">
            <span></span>
            <span id="timeDisplay">--:-- --</span>
        </div>
    </div>

    <div class="background-overlay"></div>

    <div class="wrapper" id="main-content">
        <div class="title">✦ PERSONAJES ✦</div>
        <div class="bubbles-nav">
            <a href="billie.html" class="bubble-link">
                <div class="bubble-circle">
                    <img src="https://files.catbox.moe/inev48.jpeg" alt="Billie">
                </div>
                <span class="bubble-text">BILLIE EILISH</span>
            </a>

            <a href="isaac.html" class="bubble-link">
                <div class="bubble-circle">
                    <img src="https://files.catbox.moe/r31kfd.jpg" alt="Isaac">
                </div>
                <span class="bubble-text">ISAAC ORDOÑEZ</span>
            </a>
        </div>
        
        <div class="footer">
            <div class="owner-tag">𝓢𝓽𝓪𝓻𝓛𝔂𝓷</div>
        </div>
    </div>

    <script>
        // ========== BATERÍA ==========
        async function getBatteryInfo() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    updateBatteryUI(battery);
                    
                    battery.addEventListener('levelchange', () => updateBatteryUI(battery));
                    battery.addEventListener('chargingchange', () => updateBatteryUI(battery));
                } catch (err) {
                    document.getElementById('batteryPercent').textContent = '?%';
                    document.getElementById('batteryLevelFill').style.width = '50%';
                }
            } else {
                document.getElementById('batteryPercent').textContent = 'N/A';
                document.getElementById('batteryLevelFill').style.width = '50%';
                document.getElementById('batteryLevelFill').style.background = '#888';
            }
        }
        
        function updateBatteryUI(battery) {
            const level = Math.round(battery.level * 100);
            const percentElem = document.getElementById('batteryPercent');
            const fillElem = document.getElementById('batteryLevelFill');
            
            fillElem.style.width = `${level}%`;
            
            if (level <= 15) {
                fillElem.style.background = '#ef4444';
            } else if (level <= 30) {
                fillElem.style.background = '#f59e0b';
            } else {
                fillElem.style.background = '#4ade80';
            }
            
            if (battery.charging) {
                percentElem.innerHTML = `${level}%`;
            } else {
                percentElem.innerHTML = `${level}%`;
            }
        }
        
        // ========== HORA LOCAL DE MÉXICO (formato 12h) ==========
        function updateMexicoTime() {
            const options = {
                timeZone: 'America/Mexico_City',
                hour12: true,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            
            const now = new Date();
            const timeString = now.toLocaleTimeString('es-MX', options);
            
            let formatted = timeString;
            formatted = formatted.replace('p. m.', 'PM').replace('a. m.', 'AM');
            
            document.getElementById('timeDisplay').textContent = formatted;
        }
        
        setInterval(updateMexicoTime, 1000);
        
        window.addEventListener('load', () => {
            getBatteryInfo();
            updateMexicoTime();
        });
        
        setInterval(() => {
            if ('getBattery' in navigator) {
                navigator.getBattery().then(battery => updateBatteryUI(battery)).catch(() => {});
            }
        }, 30000);
    </script>
</body>
</html>
